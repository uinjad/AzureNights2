name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Format check
        run: test -z "$(gofmt -l .)" || (echo "These files are not gofmt'd:"; gofmt -l .; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test ./... -race -count=1

      - name: Build
        run: go build ./...

      - name: Balance smoke run
        run: go run ./cmd/balance -duels 100